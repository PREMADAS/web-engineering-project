<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

    <div
        class="bg-[radial-gradient(circle_at_center,_#1e1b4b,_#0f0c20)] w-[700px] rounded-3xl shadow-xl p-10 text-center">

        <!-- Hands -->
        <div
            class="bg-white/5 border border-white/10 rounded-[2rem] p-10 md:p-14 flex flex-col md:flex-row justify-around items-center gap-8 md:gap-4 backdrop-blur-md">

            <div class="flex flex-col items-center gap-4">
                <span class="text-xs md:text-sm font-bold text-slate-400 tracking-widest">YOU</span>

                <div id="playerHand" class="text-7xl text-white md:text-8xl transition-transform duration-200">
                    <i class="fa-regular fa-hand-back-fist rotate-90"></i>
                </div>
            </div>

            <div class="vs-text text-white text-2xl font-bold">VS</div>

            <div class="flex flex-col items-center gap-4">
                <span class="text-xs md:text-sm font-bold text-slate-400 tracking-widest">COMPUTER</span>

                <div id="computerHand" class="text-7xl text-white md:text-8xl transition-transform duration-200">
                    <i class="fa-regular fa-hand-back-fist rotate-270"></i>
                </div>
            </div>

        </div>

        <!-- Result -->
        <h1 id="result" class="text-4xl text-purple-600  font-medium mt-10 mb-7">
            Let's Play!!
        </h1>

        <div class="flex items-center justify-center gap-6 md:gap-10">

            <div
                class="w-20 h-20 md:w-25 md:h-25 bg-white/5 border-2 border-emerald-500/30 rounded-2xl flex flex-col justify-center items-center shadow-[0_0_20px_rgba(16,185,129,0.1)]">
                <span class="text-xs md:text-sm font-bold text-slate-400 tracking-widest mb-1">YOU</span>
                <span id="playerScore" class="text-4xl md:text-5xl font-black text-emerald-400">0</span>
            </div>

            <div class="text-3xl md:text-4xl font-bold text-slate-500">:</div>

            <div
                class="w-20 h-20 md:w-25 md:h-25 bg-white/5 border-2 border-rose-500/30 rounded-2xl flex flex-col justify-center items-center shadow-[0_0_20px_rgba(244,63,94,0.1)]">
                <span class="text-xs md:text-sm font-bold text-slate-400 tracking-widest mb-1">CPU</span>
                <span id="computerScore" class="text-4xl md:text-5xl font-black text-rose-400">0</span>
            </div>

        </div>

        <!-- Buttons -->
        <div class="flex justify-center gap-20 mt-10">

            <!-- Rock -->
            <button onclick="playGame('rock')" class="choice-btn">

                <i class="fa-regular fa-hand-back-fist"></i>

                <p>Rock</p>
            </button>

            <!-- Paper -->
            <button onclick="playGame('paper')" class="choice-btn">

                <i class="fa-regular fa-hand"></i>

                <p>Paper</p>
            </button>

            <!-- Scissors -->
            <button onclick="playGame('scissors')" class="choice-btn">

                <i class="fa-regular fa-hand-scissors"></i>

                <p>Scissors</p>
            </button>

        </div>



        <button onclick="restartGame()"
            class="mt-8 bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl text-lg transition duration-300">

            Restart Game

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
